name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for EB CLI)
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install EB CLI
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade awsebcli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        env:
          EB_APP_NAME: ${{ secrets.EB_APP_NAME }}
          EB_ENV: ${{ secrets.EB_ENV }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          # Initialize EB application (non-interactive). If the application already exists this is a no-op.
          eb init -p docker "$EB_APP_NAME" --region "$AWS_REGION"

          # Select the environment to deploy to and deploy the current code (staged)
          eb use "$EB_ENV"
          eb deploy "$EB_ENV" --staged

      # OPTIONAL: run migrations as a one-off step (uncomment to enable)
